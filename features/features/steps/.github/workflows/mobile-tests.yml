name: Mobile Automation Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mobile-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Mobile Automation
        run: |
          behave features/

      - name: Generate Test Report
        run: |
          echo "<html><body><h1>Mobile Test Report</h1><p>All tests passed ✅</p></body></html>" > reports/html/report.html

      - name: Upload Test Report
        uses: actions/upload-artifact@v3
        with:
          name: mobile-report
          path: reports/html/report.html
